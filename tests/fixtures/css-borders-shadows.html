<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Borders and Shadows</title>
</head>
<body>
  <div data-slide="1" style="width: 1920px; height: 1080px; background-color: #f0f0f0;">
    <div style="
      width: 400px;
      height: 200px;
      margin: 100px auto;
      background-color: #ffffff;
      border: 2px solid #333333;
      border-radius: 12px;
      box-shadow: 4px 6px 12px rgba(0, 0, 0, 0.3);
      padding: 20px;
    ">
      <h2 style="font-size: 1.5em; color: #222222; font-family: Georgia;">
        Card with Border &amp; Shadow
      </h2>
      <p style="font-size: 16px; color: #555555;">
        This card demonstrates borders, border-radius, and box-shadow styling.
      </p>
    </div>

    <div style="
      width: 300px;
      height: 150px;
      margin: 40px auto;
      background-color: #e74c3c;
      border: 3px dashed #c0392b;
      box-shadow: 0 8px 16px 4px rgba(0, 0, 0, 0.4);
      padding: 15px;
    ">
      <p style="font-size: 18px; color: #ffffff; font-weight: bold; text-align: center;">
        Dashed Border Box
      </p>
    </div>
  </div>
</body>
</html>
