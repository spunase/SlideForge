<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Slide Markers</title>
</head>
<body>
  <section style="width: 1920px; height: 1080px; background-color: #1a1a2e;">
    <h1 style="font-size: 56px; color: #e94560; font-family: Arial; text-align: center; padding-top: 300px;">
      Slide One
    </h1>
    <p style="font-size: 28px; color: #ffffff; text-align: center;">Introduction</p>
  </section>

  <section style="width: 1920px; height: 1080px; background-color: #16213e;">
    <h1 style="font-size: 48px; color: #0f3460; font-family: Calibri; text-align: left; padding: 100px;">
      Slide Two
    </h1>
    <ul style="font-size: 24px; color: #e94560; padding-left: 140px;">
      <li>Point A</li>
      <li>Point B</li>
      <li>Point C</li>
    </ul>
  </section>

  <section style="width: 1920px; height: 1080px; background-color: #533483;">
    <h1 style="font-size: 48px; color: #ffffff; font-family: Verdana; text-align: center; padding-top: 400px;">
      Slide Three
    </h1>
    <p style="font-size: 20px; color: #cccccc; text-align: center;">Thank you!</p>
  </section>
</body>
</html>
